<!DOCTYPE html>
<html>
    <head>
        <title>Other Canvas Testing</title>
    </head>
    <body style="background-color: black">
        
        <canvas id="thing" width="301" height="301" style="position:fixed; border:1px solid #000"></canvas>
        <textarea style="position:fixed; top:9px; left:321px; min-height:201px; min-width:294px" id="input" placeholder="Put equations here"></textarea>
        <button style="position:fixed; top:217px; left:321px; width:300px; height:93px" onClick="draw()">Equate</button>
        <p id="text" style="color: white; position:fixed; top:300px;">Output</p>
        <script>
            canvas = document.getElementById("thing");
            ctx = canvas.getContext('2d');
            ctx.translate(150.5, 150.5);
            function equ(equation, x) {
                if (x !== undefined) equation = equation.replace(/x/g, '(' + x + ')');
                let terms = [ [
                        /(pi|π)/g,
                        "(Math.PI)"
                    ], [
                        /(infinity|∞)/g,
                        "(Math.Infinity)"
                    ], [
                        /([0-9.])\(/g,
                        "$1*("
                    ], [
                        /\)([0-9.])/,
                        ")*$1"
                    ], [
                        /([0-9.])M/g,
                        "$1*M"
                    ], [
                        /\)\(/g,
                        ")*("
                    ], [
                    	/-\(/g,
                        "(-1)*("
                ] ];
                for (let i = 0; i < terms.length; i++) {
                    equation = equation.replace(terms[i][0], terms[i][1]);
                }
                let methods = [ [
                        /\\(sin|cos|tan|csc|sec|cot|log)(\-?[0-9.]{1,}|\(\-?[0-9.]{1,}\))/g,
                        "Math.$1($2)"
                    ], [
                        /\\(?:a?(sin|cos|tan|csc|sec|cot)|(sin|cos|tan|csc|sec|cot)\^-1)(\-?[0-9.]{1,}|\(\-?[0-9.]{1,}\))/g,
                        "Math.a$1$2($3)"
                    ], [
                        /(?:\\(?:sq|)rt|√)(\-?[0-9\.]{1,}|\(\-?[0-9.]{1,}\))/g,
                        "Math.sqrt($1)"
                    ], [ // If the radicand is positive
                        /(?:\\rt|√)\[(\-?[0-9]{1,})\](\([0-9.]{1,}\)|[0-9.]{1,})/g,
                        "Math.pow($2,(1/Math.round($1)))"
                    ], [ // If the radicand is negative and the radical is odd
                        /(?:\\rt|√)\[(\-?[0-9]{0,}[13579]{1,})\](?:\(\-([0-9.]{1,})\)|\-([0-9.]{1,}))/g,
                        "-Math.pow($2$3,(1/Math.round($1)))"
                    ], [ // If the radicand is negative and the radical is even
                        /(?:\\rt|√)\[\-?[0-9]{0,}[02468]{1,}\](?:\(\-[0-9.]{1,}\)|\-[0-9.]{1,})/g,
                        "NaN"
                    ], [
                        /(\(\-?[0-9.]{1,}\)|-?[0-9.]{1,})\^(\(\-?[0-9]{1,}\)|\-?[0-9]{1,})/g,
                        "Math.pow($1,Math.round($2))"
                    ], [
                    	/(?:\\sum|∑)\[n=([0-9]{1,})\]\(([0-9]{1,})\)(\-?[0-9.]{1,}|\(\-?[0-9.]{1,}\))/g,
                        "Math.sum($1, $2, $3)"
                    ], [
                        /(?:\\prod|∏)\[n=([0-9]{1,})\]\(([0-9]{1,})\)(\-?[0-9.]{1,}|\(\-?[0-9.]{1,}\))/g,
                        "Math.prod($1, $2, $3)"
                    ], [
                        /\|(\-?[0-9.+\-/*()]{1,})\|/g,
                        "Math.abs($1)"
                ] ];
                let lastEquation;
                for (let i = 0; i < 1; i++) {
                    lastEquation = equation;
                    if (/\(Math.(PI|Infinity)\)/g.test(equation)) {
                        equation = equation.replace(/\(Math.PI\)/g, Math.PI);
                        equation = equation.replace(/\(Math.Infinity\)/g, Math.Infinity);
                    }
                    if (/\(-?[0-9.]{1,}\)/g.test(equation)) {
                        equation = equation.replace(/\((-?[0-9.]{1,})\)/g, "$1");
                    }
                    if (/\([0-9.+\-/*]{1,}\)/.test(equation)) {
                        equate = equation.match(/\([0-9.+\-/*]{1,}\)/g);
                        for (let i = 0; i < equate.length; i++) {
                            if (/\(/.test(equate[i]) && /\)/.test(equate[i]) && equate[i].match(/\(/g).length == equate[i].match(/\)/g).length) equation = equation.replace(equate[i], '(' + eval(equate[i]) + ')');
                        }
                    }
                    if (/\([0-9.\(\)+\-\/\*]{1,}\)/.test(equation)) {
                        equate = equation.match(/\([0-9.()+\-/*]{1,}\)/g);
                        for (let i = 0; i < equate.length; i++) {
                            if (/\(/.test(equate[i]) && /\)/.test(equate[i]) && equate[i].match(/\(/g).length == equate[i].match(/\)/g).length) equation = equation.replace(equate[i], '(' + eval(equate[i]) + ')');
                        }
                    }
                    for (let i = 0; i < methods.length; i++) {
                        equation = equation.replace(methods[i][0], methods[i][1]);
                    }
                    if (/Math\.(a?sin|a?cos|a?tan|a?csc|a?sec|a?cot|log|sqrt|pow|abs|sum|prod|round)\((\(\-?[0-9.]{1,}\)|-?[0-9.]{1,})(,(\(\-?[0-9\.]{1,}\)|\-?[0-9.]{1,}))?\)/g.test(equation)) {
                        equate = equation.match(/Math\.(a?sin|a?cos|a?tan|a?csc|a?sec|a?cot|log|sqrt|pow|abs|sum|prod|round)\((\(\-?[0-9.]{1,}\)|-?[0-9.]{1,})(,(\(\-?[0-9.]{1,}\)|\-?[0-9.]{1,}))?\)/g);
                        for (let i = 0; i < equate.length; i++) {
                            equation = equation.replace(equate[i], '(' + eval(equate[i]) + ')');
                        }
                    }
                    if (equation != lastEquation) i--;
                }
    
                try {
                    return ["equated", eval(equation)];
                }
                catch (err) {
                    return ["error", err];
                }
    
            }
            function draw() {
    
                // Draw blank graph
                ctx.fillStyle = '#fff';
                ctx.fillRect(-150, -150, 300, 300);
                for (let i = 80; i--;) {
                    ctx.beginPath();
                    ctx.strokeStyle = "#ddd";
                    ctx.moveTo(-150, i * 10 - 150);
                    ctx.lineTo(150, i * 10 - 150);
                    ctx.stroke();
                }
                for (let i = 80; i--;) {
                    ctx.beginPath();
                    ctx.strokeStyle = "#ddd";
                    ctx.moveTo(i * 10 - 150, -150);
                    ctx.lineTo(i * 10 - 150, 150);
                    ctx.stroke();
                }
                for (let i = 5; i--;) {
                    ctx.beginPath();
                    ctx.strokeStyle = "#bbb";
                    ctx.moveTo(-150, i * 50 - 100);
                    ctx.lineTo(150, i * 50 - 100);
                    ctx.stroke();
                }
                for (let i = 5; i--;) {
                    ctx.beginPath();
                    ctx.strokeStyle = "#bbb";
                    ctx.moveTo(i * 50 - 100, -150);
                    ctx.lineTo(i * 50 - 100, 150);
                    ctx.stroke();
                }
                ctx.beginPath();
                ctx.strokeStyle = "#000";
                ctx.moveTo(0, -150);
                ctx.lineTo(0, 150);
                ctx.moveTo(-150, 0);
                ctx.lineTo(150, 0);
                ctx.stroke();
                let input = document.getElementById("input").value;
                e = input.toLowerCase().replace(/ /g, "").split('\n').filter(x => x != '');
                input = input.split('\n');
                colors = ["#ff0000", "#ff7f00", "#fefe33", "#00ff00", "#008800", "#0d98ba", "#0000ff", "#a020f0", "#964b00", "#ffc0cb"];
                if (/;$/.test(input)) e.pop();
                if (e.length > colors.length) console.log("`Too many equations!`");
                let display = [];

                for (let i = 0; i < e.length; i++) {

                    // decide color
                    let ic = e[i].split(';');
                    let color = colors[i];
                    let y = ic[0];
                    if (ic.length == 2) {
                        if (/#([0-9a-f]{6,}|[0-9a-f]{3,})/.test(ic[1].toLowerCase())) color = ic[1].toLowerCase();
                        if (/^(red|orange|yellow|(?:light||blue)green|blue|purple|brown|pink)$/i.test(ic[1])) {
                            color = {
                                "red": "#ff0000",
                                "orange": "#ff7F00",
                                "yellow": "#fefe33",
                                "lightgreen": "00ff00",
                                "green": "#008000",
                                "bluegreen": "#0d98ba",
                                "blue": "#0000ff",
                                "purple": "#a020f0",
                                "brown": "#964b00",
                                "pink": "#ffc0cb"
                            }[ic[1].toLowerCase()];
                        }
                    }
                    y = y.replace(/^y ?= ?/, '');

                    // start graphing
                    let canEquate = true;
                    let result;

                    if (y.includes('y') && !y.includes("infinity")) {
                        canEquate = false;
                        result = "Output (*y*) must remain isolated in all equations.";
                    }
                    else
                    {
                        result = [];
                        for (let x = -150; x < 151; x++) {
                            let ans1 = equ(y, x - 0.5);
                            let ans2 = equ(y, x + 0.5);
                            let ans3 = equ(y, x);
                            if (ans1[0] == "error") {
                                result = ans1[1];
                                canEquate = false;
                                break;
                            }
                            if (ans2[0] == "error") {
                                result = ans2[1];
                                canEquate = false;
                                break;
                            }
                            if (ans3[0] == "error") {
                                result = ans3[1];
                                canEquate = false;
                                break;
                            }
                            if (ans3 == NaN) result.push([false]);
                            else
                            result.push([true, x, -ans1[1], -ans2[1]]);
                        }
                    }

                    let result_;
                    if (canEquate) {
                        ctx.strokeStyle = color;
                        ctx.lineJoin = "round";
                        ctx.lineCap = "round";
                        for (let i = 0; i < result.length; i++) {
                            if (result[i][0]) {
                                ctx.beginPath();
                                ctx.moveTo(result[i][1] - 0.5, result[i][2]);
                                ctx.lineTo(result[i][1] + 0.5, result[i][3]);
                                ctx.stroke();
                            }
                        }
                        result_ = color;
                    }
                    else
                    {
                        result_ = result;
                    }
                    display.push("y = " + input[i].split(';')[0] + " - " + result_);
                }

                ctx.beginPath();
                ctx.strokeStyle = "#000000";
                ctx.lineWidth = 1;
                ctx.strokeRect(-140, -140, 10, 10);
                ctx.font = "11px Calibri";
                ctx.fillStyle = "#000000"
                ctx.fillText("= 10 units\u00b2", -126, -132);
                let text = "Equation" + (display.length > 1 ? 's' : '') + ":\n" + display.join('\n');
                document.getElementById("text").innerText = text;
            }
            Math.sum = function(n, a, b) {
                c = a - n + 1;
                return b * c;
            }
            Math.prod = function(n, a, b) {
                c = a - n + 1;
                return Math.pow(b, c);
            }
        </script>
    </body>
</html>
